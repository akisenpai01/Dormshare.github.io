<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormShare — P2P Campus Network</title>
    
    <!-- Dependencies for QR and Websocket -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    
    <!-- Flagship Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Liquid UI — Light Theme */
            --bg-color: #f8fbff;
            --surface-color: #ffffff;
            --surface-hover: #f0f4ff;
            --border-color: rgba(0, 0, 0, 0.05);
            
            --text-main: #1a1f33;
            --text-muted: #64748b;
            
            --accent-brand: #0f172a; /* Slate Black for premium feel */
            --accent-brand-glow: rgba(15, 23, 42, 0.1);
            --accent-secondary: #0846ed; /* Hyper-Blue secondary */
            
            --token-color: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --radius-md: 1.25rem;
            --radius-xxl: 2rem;
            --shadow-premium: 0 20px 40px rgba(0, 0, 0, 0.03);
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.02);
            
            --transition-spring: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.dark-theme {
            /* Liquid UI — Obsidian Mode */
            --bg-color: #000000;
            --surface-color: #0a0a0a;
            --surface-hover: #121212;
            --border-color: rgba(255, 255, 255, 0.06);
            
            --text-main: #ffffff;
            --text-muted: #888888;
            
            --accent-brand: #ffffff;
            --accent-brand-glow: rgba(255, 255, 255, 0.15);
            --accent-secondary: #3b82f6;
            
            --shadow-premium: 0 20px 60px rgba(0, 0, 0, 0.8);
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; 
            min-height: 100vh;
            padding-bottom: 120px;
            transition: background-color 0.4s ease;
        }

        h1, h2, h3, h4, h5 { 
            font-family: var(--font-display); 
            font-weight: 800; 
            letter-spacing: -0.04em; 
            color: var(--text-main);
        }

        /* Liquid Animations */
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.96) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 var(--accent-brand-glow); } 70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* Reveal Class Fix */
        .reveal-node { animation: fadeInScale 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 1; }
        
        a { text-decoration: none; color: inherit; }
        
        .flagship-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xxl);
            box-shadow: var(--shadow-premium);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Top Bar */
        header {
            position: sticky; top: 0; z-index: 900;
            display: flex; justify-content: space-between; align-items: center;
            padding: 32px 6%;
            background: var(--bg-color);
            background-blur: 20px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }

        .brand-logo {
            font-family: var(--font-display); font-size: 28px; font-weight: 900;
            color: var(--text-main);
            letter-spacing: -0.05em;
            transition: var(--transition-spring);
        }
        .brand-logo:hover { transform: skewX(-10deg); color: var(--accent-secondary); }

        .token-badge {
            display: flex; align-items: center; gap: 10px; 
            background: var(--surface-color); border: 1px solid var(--border-color);
            padding: 10px 20px; border-radius: 100px; 
            font-family: var(--font-display); font-weight: 800; font-size: 14px;
            color: var(--text-main); box-shadow: var(--shadow-soft);
            transition: var(--transition-spring);
        }
        .token-badge:hover { transform: translateY(-4px) scale(1.05); box-shadow: var(--shadow-premium); }

        /* Navigation */
        .bottom-nav {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 1000;
            background: var(--surface-color);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 14px; border-radius: 100px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
        }
        .nav-pill {
            padding: 12px 28px; border-radius: 100px;
            font-family: var(--font-display); font-weight: 800; font-size: 14px;
            color: var(--text-muted); cursor: pointer; transition: var(--transition-spring);
            display: flex; align-items: center; gap: 10px;
        }
        .nav-pill:hover { color: var(--text-main); background: var(--surface-hover); transform: translateY(-4px); }
        .nav-pill.active { background: var(--text-main); color: var(--bg-color); animation: pulseGlow 2s infinite; }

        /* Buttons */
        .btn {
            padding: 16px 32px; border-radius: 100px;
            font-family: var(--font-display); font-weight: 800; font-size: 15px;
            border: none; cursor: pointer; transition: var(--transition-spring);
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: var(--shadow-premium); }
        .btn:active { transform: scale(0.92); }
        
        .btn-primary { background: var(--text-main); color: var(--bg-color); }
        .btn-secondary { background: var(--surface-color); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-tertiary { background: var(--accent-brand-glow); color: var(--text-main); }

        /* Input Fields */
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .input-field {
            width: 100%; padding: 16px 20px; background: #fff; border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md); color: var(--text-main); font-family: var(--font-body); font-size: 15px;
            transition: all 0.2s; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .input-field:focus { border-color: var(--accent-brand); box-shadow: 0 0 0 4px var(--accent-brand-glow); }

        /* Layout Grids */
        #app { padding: 32px 5%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }
        
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 24px; 
        }
        .bento-wide { grid-column: 1 / -1; }
        @media (min-width: 768px) {
            .bento-featured { grid-column: span 2; grid-row: span 2; }
        }

        /* Chips */
        .chip-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0 30px; scrollbar-width: none; }
        .chip-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { 
            padding: 10px 24px; border-radius: 100px; font-size: 14px; font-weight: 600; font-family: var(--font-display);
            background: #fff; border: 1px solid var(--border-color); color: var(--text-muted); 
            cursor: pointer; white-space: nowrap; transition: all 0.2s; box-shadow: var(--shadow-soft);
        }
        .filter-chip:hover { background: var(--surface-hover); color: var(--text-main); }
        .filter-chip.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }

        /* Item Cards */
        .item-card { 
            padding: 28px; display: flex; flex-direction: column; gap: 24px; cursor: pointer; position: relative; overflow: hidden;
            background: var(--surface-color); border-radius: var(--radius-xxl); border: 1px solid var(--border-color);
            transition: var(--transition-spring);
        }
        .item-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 40px 80px rgba(0,0,0,0.1); z-index: 10; }
        
        .item-visual { 
            height: 220px; border-radius: var(--radius-md); display: flex; justify-content: center; align-items: center; 
            font-size: 80px; background: var(--bg-color); position: relative; overflow: hidden;
            transition: var(--transition-spring);
        }
        .item-card:hover .item-visual { transform: scale(1.05); }

        .item-badge { 
            position: absolute; top: 16px; right: 16px; padding: 8px 16px; border-radius: 100px; 
            font-family: var(--font-display); font-size: 11px; font-weight: 800; text-transform: uppercase; 
            background: var(--surface-color); box-shadow: var(--shadow-soft); letter-spacing: 0.1em;
        }
        .badge-avail { color: var(--success); }
        .badge-pend { color: var(--warning); }
        .badge-borr { color: var(--danger); }
        
        .item-info h3 { font-size: 24px; margin-bottom: 8px; }
        .item-info .meta { color: var(--text-muted); font-size: 15px; font-weight: 600; }
        .item-cost { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color); 
        }
        .cost-val { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--text-main); }

        /* Auth */
        .auth-wrap { max-width: 440px; margin: 40px auto; text-align: center; width: 100%; padding: 48px 32px; }
        .auth-wrap h1 { font-size: 40px; margin-bottom: 12px; color: var(--accent-brand); }

        /* Chat */
        .chat-container { display: flex; flex-direction: column; height: 75vh; max-width: 900px; margin: 0 auto; width: 100%; overflow: hidden; }
        .chat-header { padding: 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: #fff; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 16px; background: var(--bg-color); }
        .msg-bubble { max-width: 70%; padding: 16px 20px; font-size: 15px; border-radius: var(--radius-md); position: relative; animation: slideIn 0.3s ease; box-shadow: var(--shadow-soft); }
        @keyframes slideIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }
        var-time { font-size: 11px; opacity: 0.7; margin-top: 8px; display: block; font-weight: 500; }
        .msg-mine { align-self: flex-end; background: var(--text-main); color: var(--bg-color); border-bottom-right-radius: 4px; border: 1px solid var(--border-color); }
        .msg-theirs { align-self: flex-start; background: var(--surface-color); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 20px 32px; background: var(--surface-color); border-top: 1px solid var(--border-color); display: flex; gap: 16px; }
        .chat-input { flex: 1; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 100px; padding: 16px 24px; color: var(--text-main); font-family: var(--font-body); outline: none; transition: var(--transition-spring); }
        .chat-input:focus { border-color: var(--accent-secondary); box-shadow: 0 0 0 4px var(--accent-brand-glow); }
        .chat-send-btn { width: 52px; height: 52px; border-radius: 50%; border: none; background: var(--text-main); color: var(--bg-color); cursor: pointer; transition: var(--transition-spring); }
        .chat-send-btn:hover { transform: scale(1.1) rotate(-10deg); }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { width: 100%; max-width: 500px; padding: 48px; background: var(--surface-color); position: relative; border-radius: var(--radius-xxl); border: 1px solid var(--border-color); animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; box-shadow: var(--shadow-premium); }
        @keyframes modalIn { from { transform: scale(0.9) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-close { position: absolute; top: 24px; right: 24px; width: 44px; height: 44px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 50%; color: var(--text-main); font-size: 20px; cursor: pointer; transition: var(--transition-spring); }
        .modal-close:hover { transform: rotate(90deg); background: var(--danger); color: white; }

        /* Loading */
        .loading-overlay { position: fixed; inset: 0; background: rgba(var(--bg-color), 0.8); backdrop-filter: blur(10px); z-index: 3000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 24px; }
        .spinner { width: 64px; height: 64px; border: 4px solid var(--border-color); border-top-color: var(--text-main); border-radius: 50%; animation: spin 0.8s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Listing Images */
        .preview-img { width: 100%; height: 200px; object-fit: cover; border-radius: var(--radius-md); margin-bottom: 16px; border: 1px solid var(--border-color); }
        .image-upload-zone { border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .image-upload-zone:hover { border-color: var(--accent-brand); background: var(--accent-brand-glow); }

        /* Toasts */
        .toast-container { position: fixed; top: 32px; right: 32px; z-index: 5000; display: flex; flex-direction: column; gap: 16px; pointer-events: none; }
        .toast {
            pointer-events: auto; padding: 20px 32px; background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); box-shadow: var(--shadow-premium); display: flex; align-items: center; gap: 16px;
            animation: toastIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); min-width: 340px;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(120px) scale(0.8); } to { opacity: 1; transform: none; } }
        .toast-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo" onclick="window.location.hash='#/'" style="cursor:pointer;">DormShare</div>
        <div class="header-controls" id="header-auth">
            <button class="btn btn-secondary" onclick="toggleTheme()" id="theme-toggle" style="padding: 10px; width: 44px; height: 44px; border-radius: 50%;">🌙</button>
        </div>
    </header>

    <div id="app"></div>

    <div class="bottom-nav" id="bottom-nav" style="display: none;">
        <div class="nav-pill active" onclick="window.location.hash='#/dashboard'" id="nav-explore">Explore</div>
        <div class="nav-pill" onclick="window.location.hash='#/items'" id="nav-items">My Listings</div>
        <div class="nav-pill" onclick="window.location.hash='#/history'" id="nav-lending">Handoffs</div>
    </div>

    <div id="loading" class="loading-overlay"><div class="spinner"></div><p id="loading-text" style="font-weight:600; color:var(--text-main);">Syncing...</p></div>

    <div class="toast-container" id="toast-container"></div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay" onclick="if(event.target === this) hideModal()">
        <div class="modal-card" id="modal-content"></div>
    </div>

    <!-- UI State and Global Store -->
    <script>
        /*
        - [x] **Phase 1: Backend Infrastructure Upgrade**
        - [x] Create `TokenTransaction.java` model & repository
        - [x] Update `User.java` and `TransactionController.java` (Trust Scores)
        - [x] Expand `NotificationService.java` for targeted payloads
        - [x] **Phase 2: Global Frontend Features**
        - [x] Implement `Toast` (in-app notification) system
        - [x] Add `Smart Search` and category filters to Dashboard
        - [x] Build the `Token Wallet` (Statement) view
        - [x] **Phase 3: Visual & Social Polish**
        - [x] Implement `Transaction Timeline` UI
        - [x] Add `Trust Stars` to marketplace cards and profiles
        - [x] Final end-to-end integration test
        */
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-theme');
            localStorage.setItem('dormshare_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle').innerText = isDark ? '☀️' : '🌙';
        }

        function initTheme() {
            const saved = localStorage.getItem('dormshare_theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('theme-toggle').innerText = '☀️';
            }
        }

        function showToast(title, msg, icon = '🔔') {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerHTML = `
                <div class="toast-icon" style="background:var(--accent-brand-glow); color:var(--accent-brand);">${icon}</div>
                <div>
                    <div style="font-weight:700; font-size:14px;">${title}</div>
                    <div style="font-size:12px; color:var(--text-muted);">${msg}</div>
                </div>
            `;
            container.appendChild(div);
            setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 400); }, 4000);
        }

        const BASE_URL = 'https://dormshare-backend.onrender.com';
        let stompClient = null;

        const Store = {
            data: { user: null, jwt: null },
            
            init() {
                const localToken = localStorage.getItem('dormshare_jwt');
                const localUser = localStorage.getItem('dormshare_user');
                if (localToken && localUser) {
                    this.data.jwt = localToken;
                    this.data.user = JSON.parse(localUser);
                }
            },
            
            save(user, jwt) {
                this.data.user = user;
                if(jwt) this.data.jwt = jwt;
                
                localStorage.setItem('dormshare_user', JSON.stringify(this.data.user));
                if(jwt) localStorage.setItem('dormshare_jwt', this.data.jwt);
            },
            
            logout() {
                this.data.user = null; this.data.jwt = null;
                localStorage.removeItem('dormshare_user');
                localStorage.removeItem('dormshare_jwt');
                if(stompClient) { stompClient.deactivate(); stompClient = null; }
            },
            
            getCurrentUser() { return this.data.user; },
            
            getHeaders() {
                const h = { 'Content-Type': 'application/json' };
                if(this.data.jwt) h['Authorization'] = 'Bearer ' + this.data.jwt;
                return h;
            },
            
            async signup(name, email, pass, block) {
                const res = await fetch(`${BASE_URL}/api/auth/signup`, {
                    method: 'POST', headers: this.getHeaders(),
                    body: JSON.stringify({ name, email, password: pass, hostelBlock: block })
                });
                if(!res.ok) {
                    const text = await res.text();
                    throw new Error(text || "Sign up failed");
                }
            },
            
            async login(email, pass) {
                try {
                    let res = await fetch(`${BASE_URL}/api/auth/signin`, {
                        method: 'POST', headers: this.getHeaders(),
                        body: JSON.stringify({ email, password: pass })
                    });
                    if(!res.ok) throw new Error("Invalid credentials or unregistered");
                    const data = await res.json();
                    
                    const u = {
                        id: data.userId || data.id,
                        name: data.name || email.split('@')[0],
                        email: data.email || email,
                        tokens: data.tokens || 10,
                        block: data.hostelBlock || 'Campus'
                    };
                    this.save(u, data.token || data.jwt);
                } catch(e) { throw new Error(e.message || "Authentication failed."); }
            },

            async getItems() {
                if(!this.data.user) return [];
                const res = await fetch(`${BASE_URL}/api/market/items?currentUserId=${this.data.user.id}`, { headers: this.getHeaders() });
                if(!res.ok) return [];
                return await res.json();
            },

            async listNewItem(itemData) {
                const res = await fetch(`${BASE_URL}/api/market/add`, {
                    method: 'POST', headers: this.getHeaders(), body: JSON.stringify(itemData)
                });
                if(!res.ok) throw new Error("Failed to post item.");
            },

            async requestBorrow(itemId) {
                const item = window.__DSDATA && window.__DSDATA.items ? window.__DSDATA.items.find(i=>i.id===itemId) : null;
                const tokenCost = item ? item.tokenCost : 0;
                const lenderId = item ? item.ownerId : null;
                const res = await fetch(`${BASE_URL}/api/transactions/request`, {
                    method: 'POST', headers: this.getHeaders(), 
                    body: JSON.stringify({ itemId, borrowerId: this.data.user.id, lenderId, tokenCost })
                });
                if(!res.ok) throw new Error("Failed to request borrow.");
            },

            async getTxns() {
                if(!this.data.user) return [];
                const res = await fetch(`${BASE_URL}/api/transactions/history?userId=${this.data.user.id}`, { headers: this.getHeaders() });
                if(!res.ok) return [];
                return await res.json();
            },

            async verifyHandoff(txnId, code) {
                const res = await fetch(`${BASE_URL}/api/transactions/verify/${txnId}`, { 
                    method: 'POST', headers: this.getHeaders(),
                    body: JSON.stringify({ code })
                });
                if(!res.ok) throw new Error("Invalid verification code.");
            },

            async getChatMessages(txnId) {
                const res = await fetch(`${BASE_URL}/api/chat/${txnId}`, { headers: this.getHeaders() });
                if(!res.ok) return [];
                return await res.json();
            },

            async submitFeedback(txnId, feedbackData) {
                const res = await fetch(`${BASE_URL}/api/transactions/feedback/${txnId}`, {
                    method: 'POST', headers: this.getHeaders(),
                    body: JSON.stringify(feedbackData)
                });
                if(!res.ok) throw new Error("Failed to submit feedback.");
            },

            async getMyItems() {
                if(!this.data.user) return [];
                const res = await fetch(`${BASE_URL}/api/market/my-items?userId=${this.data.user.id}`, { headers: this.getHeaders() });
                if(!res.ok) return [];
                return await res.json();
            },

            async getWalletHistory() {
                if(!this.data.user) return [];
                const res = await fetch(`${BASE_URL}/api/user/wallet/${this.data.user.id}`, { headers: this.getHeaders() });
                if(!res.ok) return [];
                return await res.json();
            },

            async getUserProfile(userId) {
                const res = await fetch(`${BASE_URL}/api/user/profile/${userId}`, { headers: this.getHeaders() });
                if(!res.ok) return null;
                return await res.json();
            },

            async deleteItem(id) {
                const res = await fetch(`${BASE_URL}/api/market/${id}`, {
                    method: 'DELETE',
                    headers: this.getHeaders()
                });

                        entry.target.classList.add('reveal-node');
                        entry.target.style.opacity = "1";
                    }, i * 80);
                    animationObserver.unobserve(entry.target);
                }
            });

        async function router() {

            if (!user && hash !== '#/') { window.location.hash = '#/'; return; }
            if (user && hash === '#/') { window.location.hash = '#/dashboard'; return; }

            if (hash === '#/') renderLogin(app);
            else if (hash === '#/dashboard') await renderDashboard(app);
            else if (hash === '#/items') await renderMyItems(app);
            else if (hash === '#/history') await renderHistory(app);

            else if (hash.startsWith('#/item/')) {
                nav.style.display = 'none'; // immersive details
                await renderItemInfo(app, hash.split('/')[2]);

            else if (hash.startsWith('#/chat/')) {

            }

        let currChatTxn;
        async function renderChatView(root, txnId) {
            currChatTxn = txnId;
            const user = Store.getCurrentUser();
            
            root.innerHTML = `
                <div class="flagship-card chat-container">
                    <div class="chat-header">
                        <button class="btn btn-secondary" style="padding:8px 16px;" onclick="disconnectChat(); window.history.back()">&larr; Back</button>

                    <div class="chat-input-area">
                        <input type="text" id="chat-inp" class="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMsg()" />
                        <button class="chat-send-btn" onclick="sendMsg()">↑</button>
                    </div>
                </div>
            `;

            try {
                const history = await Store.getChatMessages(txnId);
                history.forEach(m => appendMessage(m, user.id));
            } catch(e) {}

            connectChat(txnId, (msgBody) => appendMessage(msgBody, user.id));

            window.sendMsg = () => {
                const i = document.getElementById('chat-inp');
                const text = i.value.trim();
                if(!text) return;
                
                if (stompClient && stompClient.connected) {
                    stompClient.publish({
                        destination: `/app/chat.send`,
                        body: JSON.stringify({ transactionId: txnId, senderId: user.id, content: text, timestamp: Date.now().toString() })
                    });
                    i.value = '';
                } else { alert("Offline."); }
            };
        }

        function appendMessage(m, myUserId) {
            const box = document.getElementById('chat-box');
            if(!box) return;
            const isMe = m.senderId === myUserId;
            let timeStr = "Now";
            if(m.timestamp) {
                const d = new Date(parseInt(m.timestamp));
                if(d.getTime() > 0) timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            const div = document.createElement('div');
            div.className = `msg-bubble ${isMe ? 'msg-mine' : 'msg-theirs'}`;
            div.innerHTML = `${m.content} <var-time>${timeStr}</var-time>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function initSync() {
            if(stompClient) return;
            if(!window.StompJs) { setTimeout(initSync, 500); return; }

            stompClient = new window.StompJs.Client({
                brokerURL: 'wss://dormshare-backend.onrender.com/ws-chat',
                connectHeaders: { Authorization: 'Bearer ' + Store.data.jwt }
            });

            stompClient.onConnect = (frame) => {
                console.log('Real-time sync pipeline stable.');
                
                // Subscribe to Global Market Updates
                stompClient.subscribe('/topic/market', (m) => {
                    if (window.location.hash.includes('dashboard') || window.location.hash.includes('items')) router();
                });

                // Subscribe to User Specific Transaction Updates
                stompClient.subscribe('/topic/transactions', (m) => {
                    if (window.location.hash.includes('history')) router();
                });

                // Personal Notifications Queue
                const userId = Store.getCurrentUser().id;
                stompClient.subscribe(`/user/${userId}/queue/notifications`, (m) => {
                    const data = JSON.parse(m.body);
                    showToast(data.title || "Alert", data.message, data.icon);
                });
            };

            stompClient.activate();
        }

        function connectChat(txnId, onMsgRecv) {
            // Reuses the global sync client but subscribes to the specific txn channel
            if (!stompClient || !stompClient.connected) {
                initSync();
                setTimeout(() => connectChat(txnId, onMsgRecv), 1000);
                return;
            }

            const sub = stompClient.subscribe(`/topic/messages/${txnId}`, (message) => {
                if (message.body) onMsgRecv(JSON.parse(message.body));
            });
            
            window.__CURR_CHAT_SUB = sub;
        }

        function disconnectChat() { 
            if(window.__CURR_CHAT_SUB) {
                window.__CURR_CHAT_SUB.unsubscribe();
                window.__CURR_CHAT_SUB = null;
            }
        }

        window.showAddModal = () => {
            showModal(`
                <h2 style="font-size:28px; margin-bottom:8px;">Drop New Gear</h2>
                <div id="listing-form">
                    <p style="color:var(--text-muted); font-weight:500; font-size:15px; margin-bottom:32px;">List premium campus gear for others to borrow.</p>
                    <div class="input-group"><label>Item Profile Name</label><input type="text" id="a-name" class="input-field" placeholder="E.g. Sony WH-1000XM5"></div>
                    
                    <div class="input-group">
                        <label>Product Image Link</label>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="a-img" class="input-field" placeholder="Paste URL or upload &rarr;" style="flex:1">
                            <button class="btn btn-secondary" onclick="document.getElementById('img-file').click()" style="padding:0 20px;">📷</button>
                            <input type="file" id="img-file" style="display:none" onchange="uploadImage(this)">
                        </div>
                    </div>
                    
                    <div style="display:flex; gap:16px;">
                        <div class="input-group" style="flex:1"><label>Category</label>
                            <select id="a-cat" class="input-field"><option>Tech</option><option>Kitchen</option><option>Fitness</option><option>Apparel</option></select>
                        </div>
                        <div class="input-group" style="flex:1"><label>Tokens / Day</label>
                            <input type="number" id="a-cost" class="input-field" value="2">
                        </div>
                    </div>
                    <button class="btn btn-primary" id="add-btn" style="width:100%; padding:18px; margin-top:16px;" onclick="doAddItem()">Publish Drop</button>
                </div>
            `);

            window.uploadImage = async (input) => {
                if(!input.files || !input.files[0]) return;
                const file = input.files[0];
                const formData = new FormData();
                formData.append('file', file);
                
                const btn = document.getElementById('add-btn');
                btn.disabled = true; btn.innerText = 'Uploading Image...';

                try {
                    const res = await fetch(`${BASE_URL}/api/market/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + Store.data.jwt },
                        body: formData
                    });
                    const data = await res.json();
                    document.getElementById('a-img').value = data.url;
                    btn.disabled = false; btn.innerText = 'Publish Drop';
                } catch(e) {
                    alert("Upload failed.");
                    btn.disabled = false; btn.innerText = 'Publish Drop';
                }
            };
        };
        
        window.doAddItem = async () => {
            const name = document.getElementById('a-name').value;
            const category = document.getElementById('a-cat').value;
            const tokenCost = parseInt(document.getElementById('a-cost').value);
            const imageUrl = document.getElementById('a-img').value;
            if(!name || !tokenCost) return;
            try {
                await Store.listNewItem({ ownerId: Store.getCurrentUser().id, name, category, tokenCost, pickupLocation: Store.getCurrentUser().block, imageUrl, description: 'Premium Item Drop' });
                hideModal(); router();
            } catch(e) { alert(e.message); }
        };

        window.showHandoverQR = (txnId, code) => {
            showModal(`
                <div style="text-align:center;">
                    <h2 style="font-size:28px; margin-bottom:8px;">Identity Verified</h2>
                    <p style="color:var(--text-muted); margin-bottom:32px;">Show this pass to the borrower to secure the tokens.</p>
                    <div id="qr-canvas" style="background:white; padding:24px; border-radius:32px; display:inline-block; margin-bottom:24px; box-shadow:var(--shadow-premium);"></div>
                    <div style="color:var(--accent-secondary); font-family:var(--font-display); font-size:40px; letter-spacing:8px; font-weight:800;">${code}</div>
                </div>
            `);
            const qr = qrcode(0, 'H'); qr.addData(txnId); qr.make();
            document.getElementById('qr-canvas').innerHTML = qr.createImgTag(8);
        };

        window.showReturnModal = async (txnId) => {
            if (confirm("Have you successfully returned the item to the owner?")) {
                try {
                    await fetch(`${BASE_URL}/api/transactions/return/${txnId}`, {
                        method: 'POST',
                        headers: Store.getHeaders()
                    });
                    showToast("Returned!", "Item marked as returned. Please rate the experience.", "📦");
                    router();
                } catch(e) { showToast("Error", "Could not process return.", "❌"); }
            }
        };

        window.showFeedbackModal = (txnId) => {
            showModal(`
                <div style="text-align:center;">
                    <h2 style="font-size:28px; margin-bottom:8px;">Rate Transaction</h2>
                    <div style="display:flex; justify-content:center; gap:8px; margin:24px 0;" id="stars">
                        ${[1,2,3,4,5].map(nu => `<span onclick="setRating(${nu})" style="font-size:32px; cursor:pointer;" id="s-${nu}">☆</span>`).join('')}
                    </div>
                    <textarea id="f-text" class="input-field" placeholder="How was the gear/experience?" style="height:100px; border-radius:20px;"></textarea>
                    <button class="btn btn-primary" style="width:100%; margin-top:24px;" onclick="doSubmitFeedback('${txnId}')">Submit Review</button>
                </div>
            `);
            window.__CURR_RAT = 5;
            window.setRating = (n) => {
                window.__CURR_RAT = n;
                for(let i=1; i<=5; i++) document.getElementById('s-'+i).innerText = i<=n ? '★' : '☆';
            };
            setRating(5);
        };

        window.doSubmitFeedback = async (txnId) => {
            const text = document.getElementById('f-text').value;
            const user = Store.getCurrentUser();
            // Determine if user is borrower or lender for this txn (simple mock)
            await Store.submitFeedback(txnId, { borrowerRating: window.__CURR_RAT, borrowerFeedback: text });
            alert("Feedback recorded in blockchain record.");
            hideModal(); router();
        };

        window.completeHandoff = async (code) => {
            const txnId = window.location.hash.split('/').pop() || 'pending'; // This logic needs fix for context
            // For simplicity in the demo, we assume the code is entered into the field
            try {
                // Find txn from history based on context if possible or use prompt
                const res = await Store.getTxns();
                const activeTxn = res.find(t=>t.status==='pending' || t.status==='pending_verify');
                if(!activeTxn) throw new Error("No active txn");
                
                await Store.verifyHandoff(activeTxn.id, code);
                alert("Smart Handshake Successful! Tokens transferred.");
                hideModal(); router();
            } catch(e) { alert("Invalid Code."); }
        };

        initApp();
    </script>
</body>
</html>
