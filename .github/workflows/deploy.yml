name: Deploy DormShare to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Isolate Web App
        run: |
          mkdir -p _site
          cp index.html _site/
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload HTML Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy Site
        id: deployment
        uses: actions/deploy-pages@v4
