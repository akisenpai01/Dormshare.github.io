# Server
server.port=${SERVER_PORT:8082}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/dormshare}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Security
jwt.secret=${JWT_SECRET:9a67475d4a6e8f498967f1b7f1e948f9a67475d4a6e8f498967f1b7f1e948f}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*,http://localhost:19006,http://localhost:8081,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}
# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}
