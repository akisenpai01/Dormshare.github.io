#
#  spark-worker:
#    image: bitnami/spark:3.5.1
#    container_name: dormshare_spark_worker
#    depends_on:
#      - spark-master
#    environment:
#      - SPARK_MODE=worker
#      - SPARK_MASTER_URL=spark://spark-master:7077
#    ports:
#      - "8081:8081"

  # --- Spring Boot Backend ---
  backend:
    build: ./dormshare-backend
    container_name: dormshare_backend
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dormshare
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - mongodb
      - kafka

volumes:
  mongo_data:
